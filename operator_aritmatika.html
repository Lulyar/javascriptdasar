<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let result = 1+2; //disini result nya jadi 3
        document.writeln("<p> 1 + 2 = "+ result + "</p>");
        let originalResult = result; //original itu 3

        result = result -1; // result udah berubah hasilnya jadi 2
         document.writeln("<p>" + originalResult + "-1 = " + result + "</p>");
         originalResult = result ; // udah jadi 2 ngikutin result

         result = result*2;//4 ini
          document.writeln("<p> "+originalResult + "*4 = "+result+ "</p>");

    </script>
</body>
</html>
