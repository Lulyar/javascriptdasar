<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let result = +1; 
        document.writeln("<p> "+ result + "</p>");
        

        result--; // ini itu sama aja result dikurangain 1 (0)
        document.writeln("<p>" + result + "</p>");

        result++; // ini itu sama aja result ditambah 1 (1)
        document.writeln("<p>" + result + "</p>");

        result=-result; //dirubah jadi negatif
        document.writeln("<p>" + result+ "</p>")




    </script>
</body>
</html>
